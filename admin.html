<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>David Dai — 管理后台</title>

<!-- Cloudflare D1 API Configuration -->
<script>
  window.API_BASE = '/api';
  window.ADMIN_PASSWORD = 'david2025!';
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Figtree:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#f5f5f5;--bg2:#ffffff;--bg3:#e8e8e8;--bg4:#d8d8d8;
  --border:rgba(0,0,0,.1);--border2:rgba(0,0,0,.2);
  --text:#000000;--text2:#1a1a1a;--text3:#333333;
  --accent:#c8902a;--accent-pale:rgba(200,144,42,.2);
  --green:#3d9970;--green-pale:rgba(61,153,112,.2);
  --red:#c0392b;--red-pale:rgba(192,57,43,.2);
  --blue:#2980b9;--blue-pale:rgba(41,128,185,.15);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:'Figtree',sans-serif;font-weight:300;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;}

/* LOGIN */
#login-screen{display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:32px;}
.login-logo{font-family:'Cormorant Garamond',serif;font-size:22px;letter-spacing:.08em;color:var(--text2);}
.login-logo span{color:var(--accent);}
.login-box{background:var(--bg2);border:1px solid var(--border2);padding:40px;width:340px;}
.login-title{font-family:'Cormorant Garamond',serif;font-size:24px;margin-bottom:28px;}
.login-input{width:100%;background:var(--bg3);border:1px solid var(--border);padding:12px 16px;font-family:'Figtree',sans-serif;font-size:14px;color:var(--text);outline:none;transition:border-color .2s;margin-bottom:12px;}
.login-input:focus{border-color:var(--accent);}
.login-btn{width:100%;background:var(--accent);color:#fff;border:none;padding:13px;font-family:'Figtree',sans-serif;font-size:13px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:opacity .2s;}
.login-btn:hover{opacity:.85;}
.login-err{font-size:12px;color:var(--red);margin-top:8px;display:none;}

/* APP SHELL */
#app{display:none;height:100vh;flex-direction:column;}

/* TOP NAV */
.topbar{height:52px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;flex-shrink:0;}
.topbar-logo{font-family:'Cormorant Garamond',serif;font-size:16px;letter-spacing:.06em;color:var(--text2);}
.topbar-logo span{color:var(--accent);}
.topbar-right{display:flex;align-items:center;gap:20px;}
.topbar-time{font-size:11px;color:var(--text3);letter-spacing:.06em;}
.logout-btn{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);background:none;border:1px solid var(--border);padding:5px 12px;cursor:pointer;transition:color .2s,border-color .2s;}
.logout-btn:hover{color:var(--text);border-color:var(--border2);}

/* MAIN LAYOUT */
.main{display:flex;flex:1;overflow:hidden;}
.sidebar{width:240px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:20px 0;flex-shrink:0;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;font-size:13px;color:var(--text2);cursor:pointer;transition:all .15s;border-left:2px solid transparent;}
.nav-item:hover{color:var(--text);background:var(--bg3);}
.nav-item.active{color:var(--accent);background:var(--accent-pale);border-left-color:var(--accent);}
.nav-icon{font-size:15px;width:18px;text-align:center;}
.sidebar-divider{height:1px;background:var(--border);margin:12px 20px;}
.sidebar-label{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--text3);padding:8px 20px 4px;}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:32px;}
.page{display:none;}
.page.active{display:block;}

/* KPI CARDS */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:32px;}
.kpi{background:var(--bg2);border:1px solid var(--border);padding:22px 24px;}
.kpi-label{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);margin-bottom:10px;}
.kpi-val{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:400;color:var(--text);line-height:1;}
.kpi-delta{font-size:11px;margin-top:6px;}
.kpi-delta.up{color:var(--green);}
.kpi-delta.neutral{color:var(--text3);}

/* SECTION HEADER */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.sec-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:400;}
.sec-actions{display:flex;gap:8px;}
.btn-sm{font-size:11px;letter-spacing:.08em;text-transform:uppercase;background:none;border:1px solid var(--border2);padding:6px 14px;color:var(--text2);cursor:pointer;transition:all .15s;font-family:'Figtree',sans-serif;}
.btn-sm:hover{color:var(--text);border-color:var(--border2);}
.btn-sm.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
.btn-sm.primary:hover{opacity:.85;}

/* FILTER BAR */
.filter-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.filter-btn{font-size:11px;padding:5px 12px;border:1px solid var(--border);background:none;color:var(--text2);cursor:pointer;transition:all .15s;font-family:'Figtree',sans-serif;}
.filter-btn:hover,.filter-btn.active{border-color:var(--accent);color:var(--accent);background:var(--accent-pale);}
.search-input{flex:1;min-width:200px;background:var(--bg3);border:1px solid var(--border);padding:5px 12px;font-family:'Figtree',sans-serif;font-size:13px;color:var(--text);outline:none;}
.search-input:focus{border-color:var(--accent);}

/* TABLE */
.data-table{width:100%;border-collapse:collapse;font-size:13px;}
.data-table th{text-align:left;padding:10px 14px;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border);font-weight:400;}
.data-table td{padding:12px 14px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle;}
.data-table tr:hover td{background:var(--bg3);}
.data-table tr:last-child td{border-bottom:none;}

/* BADGES */
.badge{display:inline-block;font-size:10px;letter-spacing:.06em;padding:3px 8px;font-weight:400;}
.badge-new{background:var(--blue-pale);color:#5dade2;}
.badge-contacted{background:var(--accent-pale);color:var(--accent);}
.badge-qualified{background:var(--green-pale);color:var(--green);}
.badge-closed{background:rgba(255,255,255,.06);color:var(--text3);}

/* ACTION BUTTONS */
.action-btn{background:none;border:1px solid var(--border);color:var(--text2);font-size:11px;padding:4px 10px;cursor:pointer;font-family:'Figtree',sans-serif;transition:all .15s;}
.action-btn:hover{border-color:var(--border2);color:var(--text);}
.action-btn.danger:hover{border-color:var(--red);color:var(--red);}

/* DETAIL DRAWER */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:none;}
.drawer-overlay.open{display:flex;justify-content:flex-end;}
.drawer{width:440px;height:100%;background:var(--bg2);border-left:1px solid var(--border2);overflow-y:auto;display:flex;flex-direction:column;}
.drawer-header{padding:24px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.drawer-title{font-family:'Cormorant Garamond',serif;font-size:20px;}
.drawer-close{background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;line-height:1;}
.drawer-body{padding:28px;flex:1;}
.d-section{margin-bottom:28px;}
.d-section-title{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--text3);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.d-row{display:grid;grid-template-columns:110px 1fr;gap:8px;margin-bottom:10px;align-items:baseline;}
.d-lbl{font-size:11px;color:var(--text3);}
.d-val{font-size:13px;color:var(--text);}
.status-select{background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:6px 10px;font-family:'Figtree',sans-serif;font-size:13px;cursor:pointer;outline:none;width:100%;margin-top:4px;}
.notes-area{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:10px 12px;font-family:'Figtree',sans-serif;font-size:13px;min-height:100px;resize:vertical;outline:none;margin-top:4px;}
.save-btn{width:100%;background:var(--accent);color:#fff;border:none;padding:12px;font-family:'Figtree',sans-serif;font-size:12px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;margin-top:12px;transition:opacity .2s;}
.save-btn:hover{opacity:.85;}

/* VISITS CHART */
.chart-wrap{background:var(--bg2);border:1px solid var(--border);padding:24px;margin-bottom:24px;}
.chart-title{font-size:13px;color:var(--text2);margin-bottom:20px;}
.chart-bars{display:flex;align-items:flex-end;gap:6px;height:120px;}
.chart-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;}
.chart-bar{width:100%;background:var(--accent);opacity:.7;border-radius:2px 2px 0 0;min-height:4px;transition:opacity .2s;}
.chart-bar:hover{opacity:1;}
.chart-bar-lbl{font-size:9px;color:var(--text3);letter-spacing:.04em;}
.chart-bar-val{font-size:10px;color:var(--text2);}

/* NEWS & KNOWLEDGE MANAGEMENT */
.editor-modal{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:none;align-items:center;justify-content:center;}
.editor-modal.open{display:flex;}
.editor{width:700px;max-height:80vh;background:var(--bg2);border:1px solid var(--border2);overflow-y:auto;display:flex;flex-direction:column;}
.editor-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.editor-title{font-family:'Cormorant Garamond',serif;font-size:18px;}
.editor-close{background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;}
.editor-body{padding:24px;flex:1;}
.form-group{margin-bottom:16px;}
.form-label{display:block;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:8px;}
.form-input{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:10px 12px;font-family:'Figtree',sans-serif;font-size:13px;outline:none;}
.form-input:focus{border-color:var(--accent);}
.form-textarea{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:10px 12px;font-family:'Figtree',sans-serif;font-size:13px;min-height:150px;resize:vertical;outline:none;}
.form-textarea:focus{border-color:var(--accent);}
.form-select{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:10px 12px;font-family:'Figtree',sans-serif;font-size:13px;cursor:pointer;outline:none;width:100%;}
.form-select:focus{border-color:var(--accent);}
.editor-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0;}

/* EMPTY STATE */
.empty-state{text-align:center;padding:60px 20px;color:var(--text3);}
.empty-state-icon{font-size:36px;margin-bottom:16px;opacity:.4;}
.empty-state-text{font-size:14px;}

/* LOADING */
.loading{text-align:center;padding:40px;color:var(--text3);font-size:13px;}

/* TOASTS */
.toast-container{position:fixed;bottom:24px;right:24px;z-index:999;display:flex;flex-direction:column;gap:8px;}
.toast{background:var(--bg3);border:1px solid var(--border2);padding:12px 18px;font-size:13px;color:var(--text);animation:slideIn .2s ease;}
.toast.success{border-color:var(--green);color:var(--green);}
.toast.error{border-color:var(--red);color:var(--red);}
@keyframes slideIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-logo">David<span>Dai</span> · Admin</div>
  <div class="login-box">
    <h2 class="login-title">管理后台登录</h2>
    <input class="login-input" type="password" id="pwd-input" placeholder="输入管理员密码" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">登 录</button>
    <div class="login-err" id="login-err">密码错误，请重试</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-logo">David<span>Dai</span> · 管理后台</div>
    <div class="topbar-right">
      <span class="topbar-time" id="clock"></span>
      <button class="logout-btn" onclick="doLogout()">退出</button>
    </div>
  </div>

  <div class="main">
    <div class="sidebar">
      <div class="sidebar-label">主菜单</div>
      <div class="nav-item active" onclick="showPage('dashboard',this)"><span class="nav-icon">▦</span>数据概览</div>
      <div class="nav-item" onclick="showPage('leads',this)"><span class="nav-icon">◎</span>客户线索</div>
      <div class="nav-item" onclick="showPage('visits',this)"><span class="nav-icon">◈</span>访客记录</div>
      <div class="sidebar-divider"></div>
      <div class="sidebar-label">内容管理</div>
      <div class="nav-item" onclick="showPage('news',this)"><span class="nav-icon">📰</span>新闻管理</div>
      <div class="nav-item" onclick="showPage('knowledge',this)"><span class="nav-icon">📚</span>贷款知识库</div>
      <div class="sidebar-divider"></div>
      <div class="sidebar-label">工具</div>
      <div class="nav-item" onclick="window.open('index.html','_blank')"><span class="nav-icon">↗</span>查看前台网站</div>
    </div>

    <div class="content">

      <!-- DASHBOARD -->
      <div class="page active" id="page-dashboard">
        <div class="kpi-grid" id="kpi-grid">
          <div class="kpi"><div class="kpi-label">今日新线索</div><div class="kpi-val" id="kpi-today">—</div><div class="kpi-delta neutral">加载中</div></div>
          <div class="kpi"><div class="kpi-label">本月线索总量</div><div class="kpi-val" id="kpi-month">—</div><div class="kpi-delta neutral"></div></div>
          <div class="kpi"><div class="kpi-label">今日访客</div><div class="kpi-val" id="kpi-visits">—</div><div class="kpi-delta neutral"></div></div>
          <div class="kpi"><div class="kpi-label">待跟进线索</div><div class="kpi-val" id="kpi-new">—</div><div class="kpi-delta up" id="kpi-new-label"></div></div>
        </div>

        <div class="chart-wrap">
          <div class="chart-title">近 7 天访客趋势</div>
          <div class="chart-bars" id="visit-chart"><div class="loading">加载中...</div></div>
        </div>

        <div class="sec-hdr"><div class="sec-title">最新线索</div><button class="btn-sm" onclick="showPage('leads',document.querySelector('.nav-item:nth-child(3)'))">查看全部</button></div>
        <div id="dashboard-leads"><div class="loading">加载中...</div></div>
      </div>

      <!-- LEADS -->
      <div class="page" id="page-leads">
        <div class="sec-hdr">
          <div class="sec-title">客户线索</div>
          <div class="sec-actions">
            <button class="btn-sm" onclick="exportLeads()">导出 CSV</button>
            <button class="btn-sm primary" onclick="loadLeads()">刷新</button>
          </div>
        </div>
        <div class="filter-bar">
          <button class="filter-btn active" onclick="filterLeads('all',this)">全部</button>
          <button class="filter-btn" onclick="filterLeads('new',this)">新线索</button>
          <button class="filter-btn" onclick="filterLeads('contacted',this)">已联系</button>
          <button class="filter-btn" onclick="filterLeads('qualified',this)">已确认</button>
          <button class="filter-btn" onclick="filterLeads('closed',this)">已成交</button>
          <input class="search-input" id="leads-search" placeholder="搜索姓名 / 电话 / 类型..." oninput="searchLeads(this.value)">
        </div>
        <div id="leads-table-wrap"><div class="loading">加载中...</div></div>
      </div>

      <!-- VISITS -->
      <div class="page" id="page-visits">
        <div class="sec-hdr">
          <div class="sec-title">访客记录</div>
          <button class="btn-sm primary" onclick="loadVisits()">刷新</button>
        </div>
        <div id="visits-table-wrap"><div class="loading">加载中...</div></div>
      </div>

      <!-- NEWS -->
      <div class="page" id="page-news">
        <div class="sec-hdr">
          <div class="sec-title">新闻管理</div>
          <button class="btn-sm primary" onclick="openNewsEditor()">+ 新建新闻</button>
        </div>
        <div id="news-table-wrap"><div class="loading">加载中...</div></div>
      </div>

      <!-- KNOWLEDGE -->
      <div class="page" id="page-knowledge">
        <div class="sec-hdr">
          <div class="sec-title">贷款知识库</div>
          <button class="btn-sm primary" onclick="openKnowledgeEditor()">+ 新建文章</button>
        </div>
        <div id="knowledge-table-wrap"><div class="loading">加载中...</div></div>
      </div>

    </div>
  </div>
</div>

<!-- LEAD DETAIL DRAWER -->
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer(event)">
  <div class="drawer" onclick="event.stopPropagation()">
    <div class="drawer-header">
      <div class="drawer-title" id="drawer-name">线索详情</div>
      <button class="drawer-close" onclick="closeDrawer()">✕</button>
    </div>
    <div class="drawer-body">
      <div class="d-section">
        <div class="d-section-title">联系信息</div>
        <div class="d-row"><span class="d-lbl">姓名</span><span class="d-val" id="d-name">—</span></div>
        <div class="d-row"><span class="d-lbl">电话</span><span class="d-val" id="d-phone">—</span></div>
        <div class="d-row"><span class="d-lbl">Email</span><span class="d-val" id="d-email">—</span></div>
        <div class="d-row"><span class="d-lbl">提交时间</span><span class="d-val" id="d-time">—</span></div>
      </div>
      <div class="d-section">
        <div class="d-section-title">咨询内容</div>
        <div class="d-row"><span class="d-lbl">类型</span><span class="d-val" id="d-type">—</span></div>
        <div class="d-row"><span class="d-lbl">贷款金额</span><span class="d-val" id="d-amount">—</span></div>
        <div class="d-row"><span class="d-lbl">备注</span><span class="d-val" id="d-note">—</span></div>
      </div>
      <div class="d-section">
        <div class="d-section-title">跟进状态</div>
        <select class="status-select" id="d-status">
          <option value="new">新线索</option>
          <option value="contacted">已联系</option>
          <option value="qualified">已确认资质</option>
          <option value="closed">已成交</option>
        </select>
        <div style="margin-top:14px;font-size:11px;color:var(--text3);margin-bottom:4px;">内部备注</div>
        <textarea class="notes-area" id="d-internal-note" placeholder="添加跟进记录..."></textarea>
        <button class="save-btn" onclick="saveLead()">保存更新</button>
      </div>
    </div>
  </div>
</div>

<!-- NEWS EDITOR MODAL -->
<div class="editor-modal" id="news-editor-modal">
  <div class="editor">
    <div class="editor-header">
      <div class="editor-title" id="news-editor-title">新建新闻</div>
      <button class="editor-close" onclick="closeNewsEditor()">✕</button>
    </div>
    <div class="editor-body">
      <div class="form-group">
        <label class="form-label">标题 (中文) *</label>
        <input class="form-input" id="news-title-zh" placeholder="输入中文标题">
      </div>
      <div class="form-group">
        <label class="form-label">标题 (English)</label>
        <input class="form-input" id="news-title-en" placeholder="Enter English title">
      </div>
      <div class="form-group">
        <label class="form-label">类别</label>
        <select class="form-select" id="news-category">
          <option value="news">新闻 News</option>
          <option value="promotion">推广 Promotion</option>
          <option value="announcement">公告 Announcement</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">内容 (中文) *</label>
        <textarea class="form-textarea" id="news-content-zh" placeholder="输入中文内容" style="min-height:200px"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Content (English)</label>
        <textarea class="form-textarea" id="news-content-en" placeholder="Enter English content" style="min-height:150px"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">
          <input type="checkbox" id="news-published" checked style="margin-right:8px;">
          立即发布
        </label>
      </div>
    </div>
    <div class="editor-footer">
      <button class="btn-sm" onclick="closeNewsEditor()">取消</button>
      <button class="btn-sm primary" onclick="saveNews()">保存</button>
    </div>
  </div>
</div>

<!-- KNOWLEDGE EDITOR MODAL -->
<div class="editor-modal" id="knowledge-editor-modal">
  <div class="editor">
    <div class="editor-header">
      <div class="editor-title" id="knowledge-editor-title">新建文章</div>
      <button class="editor-close" onclick="closeKnowledgeEditor()">✕</button>
    </div>
    <div class="editor-body">
      <div class="form-group">

<div class="toast-container" id="toast-container"></div>

<script>
let allLeads = [];
let allVisits = [];
let allNews = [];
let allKnowledge = [];
let currentFilter = 'all';
let currentLeadId = null;
let currentNewsId = null;
let currentKnowledgeId = null;

// ── AUTH ──
function doLogin() {
  const pwd = document.getElementById('pwd-input').value;
  if (pwd === window.ADMIN_PASSWORD) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    loadAll();
    startClock();
  } else {
    document.getElementById('login-err').style.display = 'block';
  }
}
function doLogout() {
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('pwd-input').value = '';
}

// ── CLOCK ──
function startClock() {
  const el = document.getElementById('clock');
  const tick = () => { el.textContent = new Date().toLocaleString('zh-CN',{hour12:false}); };
  tick(); setInterval(tick, 1000);
}

// ── API HELPERS ──
async function apiGet(endpoint) {
  const res = await fetch(window.API_BASE + endpoint);
  if (!res.ok) throw new Error('API error: ' + res.status);
  return res.json();
}
async function apiPost(endpoint, data) {
  const res = await fetch(window.API_BASE + endpoint, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data)
  });
  if (!res.ok) throw new Error('API error: ' + res.status);
  return res.json();
}
async function apiPut(endpoint, data) {
  const res = await fetch(window.API_BASE + endpoint, {
    method: 'PUT',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data)
  });
  if (!res.ok) throw new Error('API error: ' + res.status);
  return res.json();
}
async function apiDelete(endpoint) {
  const res = await fetch(window.API_BASE + endpoint, { method: 'DELETE' });
  if (!res.ok) throw new Error('API error: ' + res.status);
  return res.json();
}

// ── PAGE NAV ──
function showPage(id, navEl) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  if (navEl) navEl.classList.add('active');
  if (id === 'leads') loadLeads();
  if (id === 'visits') loadVisits();
  if (id === 'news') loadNews();
  if (id === 'knowledge') loadKnowledge();
}

// ── LOAD ALL DATA ──
async function loadAll() {
  await Promise.all([loadDashboard(), loadLeads(), loadVisits()]);
}

// ── DASHBOARD ──
async function loadDashboard() {
  try {
    const [leads, visits] = await Promise.all([
      apiGet('/leads'),
      apiGet('/visits')
    ]);

    allLeads = leads;
    const today = new Date(); today.setHours(0,0,0,0);
    const monthStart = new Date(today.getFullYear(), today.getMonth(), 1);

    const todayLeads = leads.filter(l => new Date(l.created_at) >= today);
    const monthLeads = leads.filter(l => new Date(l.created_at) >= monthStart);
    const newLeads = leads.filter(l => l.status === 'new');
    const todayVisits = visits.filter(v => new Date(v.created_at) >= today);

    document.getElementById('kpi-today').textContent = todayLeads.length;
    document.getElementById('kpi-month').textContent = monthLeads.length;
    document.getElementById('kpi-visits').textContent = todayVisits.length;
    document.getElementById('kpi-new').textContent = newLeads.length;
    document.getElementById('kpi-new-label').textContent = newLeads.length > 0 ? '需要跟进' : '全部已处理';

    renderVisitChart(visits);
    renderDashboardLeads(leads.slice(0,5));
  } catch(e) {
    console.error('Dashboard load error:', e);
    document.getElementById('kpi-grid').innerHTML = '<div class="empty-state"><div class="empty-state-text">加载失败：' + e.message + '</div></div>';
  }
}

async function renderVisitChart(visits) {
  const days = 7;
  const dates = Array.from({length:days}, (_,i) => {
    const d = new Date(); d.setDate(d.getDate()-i); d.setHours(0,0,0,0); return d;
  }).reverse();

  const counts = dates.map(d => {
    const next = new Date(d); next.setDate(next.getDate()+1);
    return visits.filter(v => { const t=new Date(v.created_at); return t>=d&&t<next; }).length;
  });

  const max = Math.max(...counts, 1);
  const labels = dates.map(d => `${d.getMonth()+1}/${d.getDate()}`);

  document.getElementById('visit-chart').innerHTML = counts.map((c,i) => `
    <div class="chart-bar-col">
      <div class="chart-bar-val">${c||''}</div>
      <div class="chart-bar" style="height:${Math.round((c/max)*100)}%" title="${c} 次访问"></div>
      <div class="chart-bar-lbl">${labels[i]}</div>
    </div>
  `).join('');
}

function renderDashboardLeads(leads) {
  if (!leads.length) {
    document.getElementById('dashboard-leads').innerHTML = '<div class="empty-state"><div class="empty-state-icon">◎</div><div class="empty-state-text">暂无线索</div></div>';
    return;
  }
  document.getElementById('dashboard-leads').innerHTML = `
    <table class="data-table">
      <thead><tr><th>姓名</th><th>电话</th><th>类型</th><th>时间</th><th>状态</th></tr></thead>
      <tbody>${leads.map(l=>`
        <tr onclick="openDrawer('${l.id}')" style="cursor:pointer">
          <td>${l.name}</td>
          <td>${l.phone}</td>
          <td style="color:var(--text2)">${l.inquiry_type||'—'}</td>
          <td style="color:var(--text3);font-size:12px">${fmtTime(l.created_at)}</td>
          <td>${statusBadge(l.status)}</td>
        </tr>`).join('')}
      </tbody>
    </table>`;
}

// ── LEADS ──
async function loadLeads() {
  document.getElementById('leads-table-wrap').innerHTML = '<div class="loading">加载中...</div>';
  try {
    const leads = await apiGet('/leads');
    allLeads = leads;
    renderLeadsTable(allLeads);
  } catch(e) {
    document.getElementById('leads-table-wrap').innerHTML = '<div class="empty-state"><div class="empty-state-text">加载失败：' + e.message + '</div></div>';
  }
}

function filterLeads(status, btn) {
  currentFilter = status;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilter();
}

function searchLeads(q) { applyFilter(q); }

function applyFilter(q) {
  const query = (q || document.getElementById('leads-search').value).toLowerCase();
  let filtered = currentFilter === 'all' ? allLeads : allLeads.filter(l => l.status === currentFilter);
  if (query) filtered = filtered.filter(l =>
    (l.name||'').toLowerCase().includes(query) ||
    (l.phone||'').includes(query) ||
    (l.inquiry_type||'').toLowerCase().includes(query)
  );
  renderLeadsTable(filtered);
}

function renderLeadsTable(leads) {
  if (!leads.length) {
    document.getElementById('leads-table-wrap').innerHTML = '<div class="empty-state"><div class="empty-state-icon">◎</div><div class="empty-state-text">没有符合条件的线索</div></div>';
    return;
  }
  document.getElementById('leads-table-wrap').innerHTML = `
    <table class="data-table">
      <thead><tr><th>姓名</th><th>电话</th><th>Email</th><th>咨询类型</th><th>金额</th><th>时间</th><th>状态</th><th>操作</th></tr></thead>
      <tbody>${leads.map(l=>`
        <tr>
          <td style="font-weight:400">${l.name}</td>
          <td><a href="tel:${l.phone}" style="color:var(--accent)">${l.phone}</a></td>
          <td style="color:var(--text2);font-size:12px">${l.email||'—'}</td>
          <td style="color:var(--text2);font-size:12px">${(l.inquiry_type||'').replace(' — ','<br><span style="color:var(--text3)">').replace(/$/,'</span>')}</td>
          <td style="color:var(--text3);font-size:12px">${l.loan_amount||'—'}</td>
          <td style="color:var(--text3);font-size:11px">${fmtTime(l.created_at)}</td>
          <td>${statusBadge(l.status)}</td>
          <td><button class="action-btn" onclick="openDrawer('${l.id}')">详情</button></td>
        </tr>`).join('')}
      </tbody>
    </table>`;
}

// ── DRAWER ──
function openDrawer(id) {
  const l = allLeads.find(x => String(x.id)===String(id));
  if (!l) return;
  currentLeadId = id;
  document.getElementById('drawer-name').textContent = l.name;
  document.getElementById('d-name').textContent = l.name;
  document.getElementById('d-phone').innerHTML = `<a href="tel:${l.phone}" style="color:var(--accent)">${l.phone}</a>`;
  document.getElementById('d-email').textContent = l.email || '—';
  document.getElementById('d-time').textContent = fmtTime(l.created_at);
  document.getElementById('d-type').textContent = l.inquiry_type || '—';
  document.getElementById('d-amount').textContent = l.loan_amount || '—';
  document.getElementById('d-note').textContent = l.note || '—';
  document.getElementById('d-status').value = l.status || 'new';
  document.getElementById('d-internal-note').value = l.internal_note || '';
  document.getElementById('drawer-overlay').classList.add('open');
}
function closeDrawer(e) {
  if (!e || e.target === document.getElementById('drawer-overlay'))
    document.getElementById('drawer-overlay').classList.remove('open');
}

async function saveLead() {
  const status = document.getElementById('d-status').value;
  const note = document.getElementById('d-internal-note').value;
  const idx = allLeads.findIndex(x => String(x.id)===String(currentLeadId));
  if (idx>=0) { allLeads[idx].status=status; allLeads[idx].internal_note=note; }
  try {
    await apiPut('/leads/' + currentLeadId, {status, internal_note: note});
    toast('已保存', 'success');
    applyFilter();
    loadDashboard();
  } catch(e) {
    toast('保存失败：' + e.message, 'error');
  }
}

function openNewsEditor() {

  document.getElementById('news-title-en').value = '';

function editNews(id) {
  currentNewsId = id;
  const n = allNews.find(x => String(x.id)===String(id));

  document.getElementById('news-editor-title').textContent = '编辑新闻';
  document.getElementById('news-title-zh').value = n.title;
  document.getElementById('news-title-en').value = n.title_en || '';
  document.getElementById('news-category').value = n.category;
  document.getElementById('news-content-zh').value = n.content;
  document.getElementById('news-content-en').value = n.content_en || '';

}

function closeNewsEditor() {

}

async function saveNews() {
  const data = {
    title: document.getElementById('news-title-zh').value,
    title_en: document.getElementById('news-title-en').value,
    category: document.getElementById('news-category').value,
    content: document.getElementById('news-content-zh').value,
    content_en: document.getElementById('news-content-en').value,
    is_published: document.getElementById('news-published').checked
  };

  if (!data.title || !data.content) {
    toast('请填写标题和内容', 'error');

  try {
    if (currentNewsId) {
      await apiPut('/news/' + currentNewsId, data);
      toast('已更新', 'success');
    } else {
      await apiPost('/news', data);
      toast('已创建', 'success');
    }
    closeNewsEditor();
    loadNews();
  } catch(e) {
    toast('保存失败：' + e.message, 'error');
  }

async function deleteNews(id) {
  if (!confirm('确定要删除这条新闻吗？')) return;

    toast('已删除', 'success');
    loadNews();
  } catch(e) {
    toast('删除失败：' + e.message, 'error');
  }
}

// ── EXPORT ──
function exportLeads() {
  const rows = [['姓名','电话','Email','咨询类型','贷款金额','备注','状态','时间']];
  allLeads.forEach(l => rows.push([l.name,l.phone,l.email||'',l.inquiry_type||'',l.loan_amount||'',l.note||'',l.status||'',l.created_at]));
  const csv = rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download = `leads_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  toast('CSV 已导出', 'success');
}

// ── HELPERS ──
function statusBadge(s) {
  const map={new:['badge-new','新线索'],contacted:['badge-contacted','已联系'],qualified:['badge-qualified','已确认'],closed:['badge-closed','已成交']};
  const [cls,label]=map[s]||['badge-new','新线索'];
  return `<span class="badge ${cls}">${label}</span>`;
}
function fmtTime(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:false});
}
function toast(msg, type='') {
  const el = document.createElement('div');
  el.className = 'toast' + (type?' '+type:'');
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(()=>el.remove(), 3000);
}
</script>
